<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1 1">
  <!-- Rectangular column: filled rect + diagonal cross. -->
  <rect x="0" y="0" width="1" height="1" fill="#e0e0e0" stroke="#333" stroke-width="0.04"/>
  <line x1="0" y1="0" x2="1" y2="1" stroke="#333" stroke-width="0.03"/>
  <line x1="1" y1="0" x2="0" y2="1" stroke="#333" stroke-width="0.03"/>
</svg>
