<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1 1">
  <!-- Double swing door. Hinges at (0,0) and (1,0), both open toward +Y in SVG. -->
  <rect x="0" y="-0.06" width="1" height="0.12" fill="#0077b6"/>
  <!-- Left leaf: tip swings from (0.5,0) to (0,0.5), CW in SVG -->
  <path d="M 0.5,0 A 0.5,0.5 0 0,1 0,0.5" fill="none" stroke="#0077b6" stroke-width="0.03" stroke-dasharray="0.08,0.05"/>
  <line x1="0" y1="0" x2="0" y2="0.5" stroke="#0077b6" stroke-width="0.02" stroke-dasharray="0.06,0.04"/>
  <!-- Right leaf: tip swings from (0.5,0) to (1,0.5), CCW in SVG -->
  <path d="M 0.5,0 A 0.5,0.5 0 0,0 1,0.5" fill="none" stroke="#0077b6" stroke-width="0.03" stroke-dasharray="0.08,0.05"/>
  <line x1="1" y1="0" x2="1" y2="0.5" stroke="#0077b6" stroke-width="0.02" stroke-dasharray="0.06,0.04"/>
</svg>
