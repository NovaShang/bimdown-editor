  <line x1="0" y1="0.35" x2="1" y2="0.35" stroke="#4a90d9" stroke-width="0.03"/>
  <line x1="0" y1="0.65" x2="1" y2="0.65" stroke="#4a90d9" stroke-width="0.03"/>
</svg>
